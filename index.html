<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leve — Dashboard Logístico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{
  --leve-green:#8AB73A;--leve-dark:#3D5044;--leve-mid:#6A9228;--leve-lt:#C5DC8A;--leve-pale:#EEF4DC;--leve-olive:#4A6030;
  --bg:#F2F5EC;--bg2:#E8EEE0;--card:#FFFFFF;--card2:#F7FAF2;
  --tx:#2A3A24;--tx2:#4A6030;--mu:#6B7E5A;--mu2:#8F9E80;
  --bd:rgba(58,80,44,.1);--bd2:rgba(58,80,44,.18);
  --green:#8AB73A;--green-a:rgba(138,183,58,.12);
  --red:#C0392B;--red-a:rgba(192,57,43,.1);
  --orange:#D68910;--orange-a:rgba(214,137,16,.1);
  --blue:#2471A3;--blue-a:rgba(36,113,163,.1);
  --purple:#7D3C98;--teal:#1A7A6E;
  --f:'Inter',sans-serif;--ft:'Inter Tight',sans-serif;--mono:'SF Mono','Fira Mono',monospace;
  --r:10px;--r2:14px;
  --sh:0 1px 4px rgba(58,80,44,.08),0 2px 12px rgba(58,80,44,.04);
  --sh2:0 4px 20px rgba(58,80,44,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 900px 600px at 0% 0%,rgba(138,183,58,.07) 0%,transparent 70%),radial-gradient(ellipse 700px 500px at 100% 100%,rgba(61,80,68,.06) 0%,transparent 70%),var(--bg)}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(242,245,236,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:16px;padding:0 24px;height:58px;flex-wrap:wrap}
.nav-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
.nav-divider{width:1px;height:22px;background:var(--bd2);flex-shrink:0}
.nav-tabs{display:flex;gap:2px;flex:1}
.nav-tab{padding:6px 13px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--mu);border:none;background:none;transition:all .15s;white-space:nowrap;font-family:var(--f)}
.nav-tab:hover{color:var(--tx);background:var(--bd)}
.nav-tab.active{color:var(--leve-dark);background:var(--green-a);font-weight:600}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-date{font-size:.7rem;color:var(--mu);font-family:var(--mono)}
.nav-live{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--leve-mid);font-weight:600}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}



/* MAIN */
.main{max-width:1440px;margin:0 auto;padding:22px 20px}
.tab-content{display:none}.tab-content.active{display:block}
.sec-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu2);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bd2)}

/* GAUGE KPI ROW */
.gauge-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px}
.gauge-kpi-card{background:#1a2818;border:1px solid rgba(138,183,58,.2);border-radius:var(--r2);padding:14px 16px 16px;box-shadow:0 4px 20px rgba(0,0,0,.3);display:flex;flex-direction:column;align-items:center}
.gauge-kpi-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.65);font-weight:700;margin-bottom:4px;text-align:center}
.gauge-canvas-wrap{display:flex;flex-direction:column;align-items:center;width:200px;margin:0 auto}
.gauge-canvas-wrap canvas{display:block}
.gauge-center-val{text-align:center;font-family:var(--ft);font-weight:700;font-size:1.6rem;color:#ffffff;letter-spacing:-.5px;line-height:1;margin-top:8px;padding:4px 0 2px}
.gauge-vals{display:flex;flex-direction:column;align-items:center;margin-top:8px;gap:2px}
.gauge-pct{font-family:var(--ft);font-weight:700;font-size:1.7rem;color:#ffffff;letter-spacing:-.5px;line-height:1}
.gauge-pct-unit{font-size:1rem;font-weight:500;margin-left:1px;color:rgba(255,255,255,.8)}
.gauge-peso{font-family:var(--ft);font-weight:700;font-size:1rem;color:rgba(255,255,255,.85);letter-spacing:-.3px;line-height:1}
.gauge-center-unit{font-size:.85rem;font-weight:500;display:inline;margin-left:1px;color:rgba(255,255,255,.7)}
.gauge-kpi-sub{font-size:.68rem;color:rgba(255,255,255,.45);margin-top:8px;text-align:center}

/* KPI SMALL */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s}
.kpi:hover{box-shadow:var(--sh2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gn::before{background:var(--green)}.kpi.gd::before{background:var(--leve-dark)}
.kpi.or::before{background:var(--orange)}.kpi.rd::before{background:var(--red)}
.kpi.bl::before{background:var(--blue)}.kpi.tl::before{background:var(--teal)}
.kpi-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);font-weight:600;margin-bottom:6px}
.kpi-val{font-family:var(--ft);font-size:1.45rem;font-weight:700;line-height:1;letter-spacing:-.5px}
.kpi.gn .kpi-val{color:var(--leve-mid)}.kpi.gd .kpi-val{color:var(--leve-dark)}
.kpi.or .kpi-val{color:var(--orange)}.kpi.rd .kpi-val{color:var(--red)}
.kpi.bl .kpi-val{color:var(--blue)}.kpi.tl .kpi-val{color:var(--teal)}
.kpi-sub{font-size:.66rem;color:var(--mu);margin-top:4px}

/* CARD */
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:17px 19px;box-shadow:var(--sh)}
.card-title{font-size:.76rem;font-weight:600;color:var(--tx);margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title span{color:var(--mu);font-weight:400;font-size:.68rem}
.chart-wrap{position:relative;width:100%;min-height:300px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:14px}
@media(max-width:860px){.g2,.g21,.g12{grid-template-columns:1fr}}

/* GAUGE BARS */
.gauge-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.gauge-lbl{font-size:.73rem;color:var(--tx2);min-width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gauge-bar{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px}
.gauge-pct{font-size:.7rem;color:var(--mu);min-width:38px;text-align:right;font-family:var(--mono)}
.gauge-kg{font-size:.67rem;color:var(--mu2);font-family:var(--mono);min-width:80px;text-align:right}

/* STACK */
.stack-row{display:grid;grid-template-columns:130px 1fr 54px;align-items:center;gap:9px;margin-bottom:7px}
.stack-name{font-size:.73rem;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stack-bar-wrap{height:15px;border-radius:3px;background:var(--bg2);display:flex;overflow:hidden}
.stack-seg{height:100%}
.stack-pct{font-size:.67rem;color:var(--mu);font-family:var(--mono);text-align:right}

/* TABLE */
.tw{overflow-x:auto}
.dt{width:100%;border-collapse:collapse;font-size:.76rem}
.dt th{padding:7px 9px;text-align:left;color:var(--mu);font-weight:600;font-size:.63rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--bd2);white-space:nowrap;background:var(--card2)}
.dt td{padding:6px 9px;border-bottom:1px solid var(--bd);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:var(--leve-pale)}
.dt td.n{font-family:var(--mono);font-size:.7rem;text-align:right;color:var(--mu)}
.dt td.n.ok{color:var(--leve-mid);font-weight:600}.dt td.n.warn{color:var(--orange);font-weight:600}.dt td.n.cr{color:var(--red);font-weight:600}
.dt td.fw{font-weight:500;color:var(--tx)}

/* PILLS */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;white-space:nowrap}
.pill.gn{background:var(--green-a);color:var(--leve-mid);border:1px solid rgba(138,183,58,.25)}
.pill.rd{background:var(--red-a);color:var(--red);border:1px solid rgba(192,57,43,.2)}
.pill.or{background:var(--orange-a);color:var(--orange);border:1px solid rgba(214,137,16,.2)}
.pill.bl{background:var(--blue-a);color:var(--blue);border:1px solid rgba(36,113,163,.2)}
.pill.gd{background:rgba(61,80,68,.08);color:var(--leve-dark);border:1px solid rgba(61,80,68,.15)}

/* TIMELINE */
.tl{position:relative;padding-left:14px}
.tl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--bd2)}
.tl-item{position:relative;padding:0 0 13px 18px}
.tl-item::before{content:'';position:absolute;left:-5px;top:5px;width:9px;height:9px;border-radius:50%;border:2px solid}
.tl-item.saida::before{border-color:var(--green);background:var(--green-a)}
.tl-item.dev::before{border-color:var(--red);background:var(--red-a)}
.tl-item.both::before{border-color:var(--orange);background:var(--orange-a)}
.tl-date{font-size:.65rem;font-family:var(--mono);color:var(--mu2);margin-bottom:2px}
.tl-title{font-size:.76rem;font-weight:600;color:var(--tx)}
.tl-contrato{font-size:.67rem;color:var(--mu);font-family:var(--mono);margin-top:1px}
.tl-peso{display:inline-block;margin-top:3px;font-size:.68rem;font-family:var(--mono);font-weight:600}
.tl-peso.s{color:var(--green)}.tl-peso.d{color:var(--red)}

/* DEFICIT CARDS */
.dc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:11px;margin-bottom:16px}
.dc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 15px;box-shadow:var(--sh);position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.dc.critico::before,.dc.alto::before,.dc.medio::before{background:var(--orange)}
.dc.baixo::before{background:var(--green)}
.dc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.dc-obra{font-size:.84rem;font-weight:700;color:var(--tx)}
.dc-contrato{font-size:.66rem;color:var(--mu);font-family:var(--mono);margin-top:1px}
.dc-data{font-size:.7rem;font-family:var(--mono);font-weight:600}
.dc.critico .dc-data,.dc.alto .dc-data,.dc.medio .dc-data{color:var(--orange)}
.dc.baixo .dc-data{color:var(--green)}
.dc-meta{font-size:.68rem;color:var(--mu);margin-bottom:7px}
.dc-item-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--bd)}
.dc-item-row:last-child{border-bottom:none}
.dc-equip{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.72rem;color:var(--tx)}
.dc-falta{font-family:var(--mono);font-size:.68rem;color:var(--red);font-weight:700;margin-left:8px;white-space:nowrap}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 11px 8px 32px;color:var(--tx);font-size:.78rem;font-family:var(--f);outline:none;box-shadow:var(--sh);transition:border-color .15s}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap input::placeholder{color:var(--mu2)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mu2);font-size:13px;pointer-events:none}
.filter-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.cal-nav-title{font-family:var(--ft);font-size:1rem;font-weight:700;color:var(--leve-dark);letter-spacing:-.3px}
.cal-nav-btns{display:flex;gap:6px}
.cal-btn{background:var(--card);border:1px solid var(--bd2);border-radius:6px;padding:5px 12px;font-size:.75rem;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .15s;font-family:var(--f)}
.cal-btn:hover{background:var(--leve-pale);border-color:var(--green)}
.cal-btn.active{background:var(--leve-dark);color:#fff;border-color:var(--leve-dark)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd2);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd2)}
.cal-dow{background:var(--leve-dark);color:rgba(255,255,255,.85);text-align:center;padding:8px 4px;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.cal-cell{background:var(--card);min-height:96px;padding:7px 7px 6px;vertical-align:top}
.cal-cell:hover{background:var(--leve-pale)}
.cal-cell.other-month{background:var(--bg2)}
.cal-cell.other-month .cal-day-num{color:var(--mu2)}
.cal-cell.today{background:var(--leve-pale)}
.cal-cell.today .cal-day-num{background:var(--leve-dark);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
.cal-day-num{font-size:.75rem;font-weight:600;color:var(--tx2);margin-bottom:4px;display:inline-block}
.cal-event{border-radius:4px;padding:2px 6px;font-size:.63rem;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;line-height:1.4;cursor:default;border-left:3px solid}
.cal-event.saida{background:rgba(138,183,58,.15);color:#4a6030;border-left-color:#8AB73A}
.cal-event.saida.faltante{background:rgba(214,137,16,.13);color:#7D5000;border-left-color:#D68910}
.cal-event.retorno{background:rgba(192,57,43,.08);color:#8B2218;border-left-color:#C0392B}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.7rem;color:var(--mu)}
.cal-legend-item{display:flex;align-items:center;gap:5px}
.cal-legend-dot{width:10px;height:10px;border-radius:2px;border-left:3px solid}
.cal-event-count{font-size:.58rem;color:var(--mu);margin-top:1px;display:block}

<div class="main">

<div class="tab-content active" id="tab-geral">
  <div class="sec-title">Indicadores principais</div>
  <div class="gauge-kpi-row" id="gaugeKpiRow"></div>
  <div class="sec-title">Estoque por família e distribuição</div>
  <div class="g21">
    <div class="card"><div class="card-title">Composição por família <span>peso total (kg)</span></div><div class="chart-wrap" style="height:250px"><canvas id="cFamilia"></canvas></div></div>
    <div class="card"><div class="card-title">Distribuição <span>% do estoque</span></div><div class="chart-wrap" style="height:250px"><canvas id="cDonut"></canvas></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="card-title">Ociosidade por família <span>% disponível / total</span></div><div id="gaugeWrap"></div></div>
    <div class="card"><div class="card-title">Disponível vs Locado <span>em toneladas</span></div><div id="stackWrap"></div></div>
  </div>
  <div style="margin-bottom:18px">
    <div class="card">
      <div class="card-title">Ociosidade para locação imediata <span>quadros (un) e perfis (m lineares) · após todas as movimentações previstas</span></div>
      <div id="ocioImediataWrap" style="min-height:120px"></div>
    </div>
  </div>
  <div class="sec-title">Evolução do saldo — ciclo atual</div>
  <div class="card" style="margin-bottom:14px"><div class="card-title">Saldo em peso (kg) <span>simulação cronológica · estoque compartilhado entre cargas</span></div><div class="chart-wrap" style="height:220px"><canvas id="cEvolucao"></canvas></div></div>
  <div class="g2">
    <div class="card"><div class="card-title">Fluxo por data <span>saídas e retornos (kg)</span></div><div class="chart-wrap" style="height:170px"><canvas id="cFluxo"></canvas></div></div>
    <div class="card"><div class="card-title">Próximas Movimentações Mapeadas por Contrato</div>
      <div class="tw"><table class="dt"><thead><tr><th>Contrato</th><th>Obra</th><th>Data</th><th>Tipo</th><th style="text-align:right">Peso (kg)</th></tr></thead><tbody id="tbMovs"></tbody></table></div>
    </div>
  </div>
</div>

<div class="tab-content" id="tab-ociosidade">
  <div class="sec-title">Ociosidade por família</div>
  <div class="kpi-grid" id="kpiOcio"></div>
  <div class="g2">
    <div class="card"><div class="card-title">% de ociosidade por família</div><div class="chart-wrap" style="height:290px"><canvas id="cOcio"></canvas></div></div>
    <div class="card"><div class="card-title">Peso disponível no pátio <span>toneladas ociosas</span></div><div class="chart-wrap" style="height:290px"><canvas id="cPesoDisp"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Detalhe por equipamento <span>top 40 por peso disponível</span></div>
    <div class="tw"><table class="dt"><thead><tr><th>Equipamento</th><th>Família</th><th style="text-align:right">Disp. (un)</th><th style="text-align:right">Locado (un)</th><th style="text-align:right">Peso Disp. (kg)</th><th style="text-align:right">Peso Loc. (kg)</th><th style="text-align:right">Ociosidade</th></tr></thead><tbody id="tbOcio"></tbody></table></div>
  </div>
</div>

<div class="tab-content" id="tab-logistica">
  <div class="sec-title">Grade logística</div>
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)" id="kpiLog"></div>
  <div class="card" style="margin-bottom:14px">
    <div class="cal-nav">
      <div class="cal-nav-title" id="calMonthTitle"></div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="cal-legend">
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(138,183,58,.15);border-left-color:#8AB73A"></div>Saída OK</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(214,137,16,.13);border-left-color:#D68910"></div>Saída com Itens Faltantes</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(192,57,43,.08);border-left-color:#C0392B"></div>Retorno</div>
        </div>

// ── SPEEDOMETER GAUGES ──
function drawGauge(canvasId, pct, zones, meta){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;

  var SIZE = 200;
  canvas.width  = SIZE;
  canvas.height = Math.round(SIZE * 0.60);

  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  if(!W||!H||W<=0||H<=0) return;

  var cx = W/2;
  var cy = H - 14;
  var Ro = W * 0.38;
  var Ri = Ro * 0.44;

  ctx.clearRect(0,0,W,H);
  function toA(p){ return Math.PI + (p/100)*Math.PI; }

  function wedge(p1,p2,fillColor){
    if(p2<=p1) return;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,Ro,toA(p1),toA(p2));
    ctx.arc(cx,cy,Ri,toA(p2),toA(p1),true);
    ctx.closePath();
    ctx.fillStyle=fillColor; ctx.fill();
  }

  // ── 1. BACKGROUND ZONES ──────────────────────────
  var prev=0;
  if(zones&&zones.length){
    for(var i=0;i<zones.length;i++){ wedge(prev,zones[i].end,zones[i].bgColor); prev=zones[i].end; }
  } else { wedge(0,100,'rgba(255,255,255,0.1)'); }

  // ── 2. BRIGHT FILL ───────────────────────────────
  if(pct>0&&zones&&zones.length){
    var p=0;
    for(var i=0;i<zones.length;i++){
      var se=Math.min(pct,zones[i].end);
      if(p<se) wedge(p,se,zones[i].color);
      p=zones[i].end; if(p>=pct) break;
    }
  } else if(pct>0){ wedge(0,pct,'#58a6ff'); }

  // ── 3. ZONE SEPARATORS ───────────────────────────
  if(zones&&zones.length){
    ctx.strokeStyle='rgba(10,20,10,0.65)'; ctx.lineWidth=2;
    for(var i=0;i<zones.length-1;i++){
      var a=toA(zones[i].end);
      ctx.beginPath();
      ctx.moveTo(cx+Ri*Math.cos(a),cy+Ri*Math.sin(a));
      ctx.lineTo(cx+Ro*Math.cos(a),cy+Ro*Math.sin(a));
      ctx.stroke();
    }
  }

  // ── 4. OUTER BORDER ──────────────────────────────
  ctx.beginPath(); ctx.arc(cx,cy,Ro,Math.PI,0); ctx.arc(cx,cy,Ri,0,Math.PI,true);
  ctx.closePath(); ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1; ctx.stroke();

  // ── 5. NEEDLE ────────────────────────────────────
  var nA=toA(pct), nLen=Ri*0.85;
  ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=4;
  ctx.beginPath();
  ctx.moveTo(cx-3*Math.cos(nA+Math.PI/2),cy-3*Math.sin(nA+Math.PI/2));
  ctx.lineTo(cx+nLen*Math.cos(nA),cy+nLen*Math.sin(nA));
  ctx.lineTo(cx+3*Math.cos(nA+Math.PI/2),cy+3*Math.sin(nA+Math.PI/2));
  ctx.closePath(); ctx.fillStyle='#000000'; ctx.fill();
  // White outline for contrast
  ctx.beginPath();
  ctx.moveTo(cx-3*Math.cos(nA+Math.PI/2),cy-3*Math.sin(nA+Math.PI/2));
  ctx.lineTo(cx+nLen*Math.cos(nA),cy+nLen*Math.sin(nA));
  ctx.lineTo(cx+3*Math.cos(nA+Math.PI/2),cy+3*Math.sin(nA+Math.PI/2));
  ctx.closePath(); ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1; ctx.stroke();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(cx,cy,Ri*0.28,0,Math.PI*2);
  ctx.fillStyle='#000000'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();

  // ── 6. OUTSIDE LABELS — all same style (tick + pill) ─
  function outsideLabel(pVal, txt){
    var a   = toA(pVal);
    var tR  = Ro + 8;
    var lR  = Ro + 20;
    var tx  = cx + lR*Math.cos(a);
    var ty  = cy + lR*Math.sin(a);

    // tick
    ctx.beginPath();
    ctx.moveTo(cx+(Ro+1)*Math.cos(a), cy+(Ro+1)*Math.sin(a));
    ctx.lineTo(cx+tR*Math.cos(a),     cy+tR*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,0.85)';
    ctx.lineWidth=2; ctx.stroke();

    // pill background
    ctx.font='bold 8px Inter,sans-serif';
    var tw=ctx.measureText(txt).width+7;
    var th=13;
    // roundRect fallback for older browsers
    var rx=3, bx=tx-tw/2, by=ty-th/2;
    ctx.beginPath();
    ctx.moveTo(bx+rx,by);
    ctx.lineTo(bx+tw-rx,by); ctx.arcTo(bx+tw,by,bx+tw,by+rx,rx);
    ctx.lineTo(bx+tw,by+th-rx); ctx.arcTo(bx+tw,by+th,bx+tw-rx,by+th,rx);
    ctx.lineTo(bx+rx,by+th); ctx.arcTo(bx,by+th,bx,by+th-rx,rx);
    ctx.lineTo(bx,by+rx); ctx.arcTo(bx,by,bx+rx,by,rx);
    ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fill();

    // text
    ctx.fillStyle='#ffffff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(txt, tx, ty);
  }

  // All boundaries: 0%, zone ends (15%,30% or 70%,85%), 100%
  if(zones&&zones.length){
    outsideLabel(0, '0%');
    for(var i=0;i<zones.length-1;i++){
      outsideLabel(zones[i].end, zones[i].end+'%');
    }
    outsideLabel(100, '100%');
  } else {
    outsideLabel(0,'0%'); outsideLabel(100,'100%');
  }
}

function renderGaugeKPIs(){
  const k=D.kpis;

  // ── PROJECTION HELPER ────────────────────────────────────────────────
  // Compute disponivel_kg at today + N days using movimentacoes
  function projetarDisponivel(diasFuturos){
    var hoje = new Date();
    hoje.setHours(0,0,0,0);
    var limite = new Date(hoje.getTime() + diasFuturos*24*60*60*1000);
    var limiteStr = limite.toISOString().slice(0,10); // YYYY-MM-DD
    var dispProj = k.peso_disponivel_kg||0;
    (D.movimentacoes||[]).forEach(function(m){
      if(!m.data) return;
      if(m.data > limiteStr) return; // beyond window
      var kg = parseFloat(m.peso_kg)||0;
      if(m.tipo==='Retorno') dispProj += kg;   // returns add to disponivel
      else                   dispProj -= kg;   // saídas remove from disponivel
    });
    return Math.max(0, dispProj);
  }

  var totalKg  = k.peso_total_kg||0;
  var dispKg   = k.peso_disponivel_kg||0;
  var locKg    = k.peso_locado_kg||0;

  // Current
  var ocioPct  = Math.round(k.ociosidade_pct||0);
  var locPct   = Math.round(k.taxa_locacao_pct||0);

  // Projections
  var disp30   = projetarDisponivel(30);
  var disp60   = projetarDisponivel(60);
  var ocio30   = totalKg>0 ? Math.round(disp30/totalKg*1000)/10 : 0;
  var ocio60   = totalKg>0 ? Math.round(disp60/totalKg*1000)/10 : 0;

  // Helper: format kg -> t string
  function fmtT(kg){ return (Math.round(kg/100)/10).toFixed(1)+'t'; }

  // Zone sets
  const zOcio=[
    {end:15, color:'#2d7a3a', bgColor:'rgba(45,122,58,0.35)'},
    {end:30, color:'#c98a00', bgColor:'rgba(201,138,0,0.35)'},
    {end:100,color:'#9b1c1c', bgColor:'rgba(155,28,28,0.35)'},
  ];
  const zLoc=[
    {end:70, color:'#9b1c1c', bgColor:'rgba(155,28,28,0.35)'},
    {end:85, color:'#c98a00', bgColor:'rgba(201,138,0,0.35)'},
    {end:100,color:'#2d7a3a', bgColor:'rgba(45,122,58,0.35)'},
  ];

  const gauges=[
    {
      id:'g-ocio', label:'Ociosidade Geral',
      val:ocioPct, unit:'%', peso: fmtT(dispKg),
      pesoLabel:'disponível no pátio',
      pct:ocioPct, zones:zOcio, meta:15
    },
    {
      id:'g-loc', label:'Taxa de Locação',
      val:locPct, unit:'%', peso: fmtT(locKg),
      pesoLabel:'em campo',
      pct:locPct, zones:zLoc, meta:85
    },
    {
      id:'g-disp', label:'Ociosidade em 30 dias',
      val:Math.round(ocio30*10)/10, unit:'%', peso: fmtT(disp30),
      pesoLabel:'disponível previsto',
      pct:Math.round(ocio30), zones:zOcio, meta:15
    },
    {
      id:'g-fld', label:'Ociosidade em 60 dias',
      val:Math.round(ocio60*10)/10, unit:'%', peso: fmtT(disp60),
      pesoLabel:'disponível previsto',
      pct:Math.round(ocio60), zones:zOcio, meta:15
    },
  ];

  document.getElementById('gaugeKpiRow').innerHTML=gauges.map(g=>
    '<div class="gauge-kpi-card">'+
    '<div class="gauge-kpi-label">'+g.label+'</div>'+
    '<div class="gauge-canvas-wrap"><canvas id="'+g.id+'"></canvas></div>'+
    '<div class="gauge-vals">'+
      '<span class="gauge-pct">'+g.val+'<span class="gauge-pct-unit">%</span></span>'+
      '<span class="gauge-peso">'+g.peso+'</span>'+
    '</div>'+
    '<div class="gauge-kpi-sub">'+g.pesoLabel+'</div>'+
    '</div>'
  ).join('');

  requestAnimationFrame(()=>{gauges.forEach(g=>drawGauge(g.id,g.pct,g.zones,g.meta||null));});
}

    return '<div class="gauge-row"><div class="gauge-lbl">'+x.Grupo+'</div><div class="gauge-bar"><div class="gauge-fill" style="width:'+Math.min(p,100)+'%;background:'+c+'"></div></div><div class="gauge-pct">'+p+'%</div><div class="gauge-kg">'+f(x.Peso_Disp)+' kg</div></div>';

function renderTimeline(){
  const byDate={};
  D.movimentacoes.forEach(m=>{
    if(!byDate[m.data_fmt])byDate[m.data_fmt]={saidas:[],devs:[]};
    if(m.tipo==='Saída')byDate[m.data_fmt].saidas.push(m);else byDate[m.data_fmt].devs.push(m);
  });
  document.getElementById('tlWrap').innerHTML=Object.entries(byDate).map(([data,ev])=>{

    const lbl=tipo==='both'?'Saída + Retorno':tipo==='saida'?'Saída':'Retorno';
    let items='';
    ev.saidas.forEach(m=>{items+='<div class="tl-contrato">'+m.contrato+' — '+m.obra+'</div><span class="tl-peso s">−'+fp(m.peso_kg)+' kg</span>';});

    return '<div class="tl-item '+tipo+'"><div class="tl-date">'+data+'</div><div class="tl-title">'+lbl+'</div>'+items+'</div>';
  }).join('');
}

// ── RENDER: OCIOSIDADE PARA LOCAÇÃO IMEDIATA ─────────────────────────────
function renderOcioImediata(){
  var wrap = document.getElementById('ocioImediataWrap');
  if(!wrap) return;

  // Use ociosoMap if available (from planejamento simulation),
  // fallback to disponivel_hoje if only SAM is loaded
  var ociosoMap = D.ociosoMap || null;
  var itens     = D.itens    || [];

  if(!itens.length && !ociosoMap){
    wrap.innerHTML='<div style="padding:20px;color:var(--mu);font-size:.82rem">Carregue o SAM CSV e o Planejamento XLSX para visualizar.</div>';
    return;
  }

  // Extract perfil length from name: last number = cm -> metres
  function getMetros(name){
    var m = name.match(/[-\s](\d{2,3})\s*(?:E)?$/i);
    if(m) return parseInt(m[1])/100;
    return null;
  }

  // Build per-item ocioso quantity
  // If ociosoMap available: use simulated final stock (correct logic)
  // Else: use disponivel today (fallback)
  function getOcioso(name){
    if(ociosoMap && ociosoMap.hasOwnProperty(name)) return ociosoMap[name];
    if(!ociosoMap){
      // fallback: find in D.itens
      var it = itens.find(function(x){ return x.Equipamento===name; });
      return it ? (it.Qtde_Disponivel||0) : 0;
    }
    return 0; // not in ociosoMap = 0 ocioso (all needed or none available)
  }

  // Collect all item names (from SAM itens or from ociosoMap keys)
  var allNames = [];
  if(itens.length){
    itens.forEach(function(it){ if(it.Equipamento) allNames.push(it.Equipamento); });
  } else {
    allNames = Object.keys(ociosoMap||{});
  }

  var quadros   = [];
  var perfisMap = {};

  allNames.forEach(function(name){
    if(/prolongador/i.test(name)) return;
    var qty = getOcioso(name);
    if(qty <= 0) return;

    if(/quadro/i.test(name)){
      quadros.push({nome:name, qtde:Math.round(qty)});
    } else if(/^perfil\s/i.test(name)){
      var metros = getMetros(name);
      if(!metros) return;
      var family = name.replace(/\s+\d+\s*E?\s*$/i,'').replace(/-\d+\s*E?\s*$/i,'').trim();
      if(!perfisMap[family]) perfisMap[family]={nome:family,totalM:0,itens:[]};
      var tm = Math.round(qty*metros*100)/100;
      perfisMap[family].totalM += qty*metros;
      perfisMap[family].itens.push({nome:name,qtde:Math.round(qty),metros:metros,totalM:tm});
    }
  });

  quadros.sort(function(a,b){return a.nome.localeCompare(b.nome);});
  var perfisList = Object.values(perfisMap).sort(function(a,b){return a.nome.localeCompare(b.nome);});
  perfisList.forEach(function(pf){
    pf.totalM = Math.round(pf.totalM*100)/100;
    pf.itens.sort(function(a,b){return a.nome.localeCompare(b.nome);});
  });

  var totalQ = quadros.reduce(function(s,q){return s+q.qtde;},0);
  var totalM = perfisList.reduce(function(s,p){return s+p.totalM;},0);

  // Source label
  var sourceNote = ociosoMap
    ? '<span style="color:var(--leve-green);font-size:.68rem;font-weight:600">✓ Simulação completa</span> <span style="color:var(--mu);font-size:.65rem">(disponível hoje + devoluções - saídas previstas)</span>'
    : '<span style="color:#c98a00;font-size:.68rem;font-weight:600">⚠ Apenas disponível hoje</span> <span style="color:var(--mu);font-size:.65rem">(carregue o Planejamento XLSX para simulação completa)</span>';

  // ── SUMMARY CARDS ────────────────────────────────────────────────────
  var html = '<div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;align-items:center">';
  html += '<div style="background:var(--green-a);border-left:3px solid var(--leve-green);border-radius:0 8px 8px 0;padding:9px 16px;min-width:150px">'
    +'<div style="font-size:.63rem;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:2px">Total quadros ociosos</div>'
    +'<div style="font-size:1.4rem;font-weight:700;color:var(--leve-dark)">'+totalQ+'<span style="font-size:.75rem;font-weight:500"> un</span></div>'
    +'</div>';
  html += '<div style="background:var(--green-a);border-left:3px solid var(--leve-green);border-radius:0 8px 8px 0;padding:9px 16px;min-width:150px">'
    +'<div style="font-size:.63rem;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:2px">Total perfis ociosos</div>'
    +'<div style="font-size:1.4rem;font-weight:700;color:var(--leve-dark)">'+Math.round(totalM).toLocaleString('pt-BR')+'<span style="font-size:.75rem;font-weight:500"> m</span></div>'
    +'</div>';
  html += '<div style="flex:1;min-width:200px">'+sourceNote+'</div>';
  html += '</div>';

  // ── TOOLTIP ──────────────────────────────────────────────────────────
  html += '<div id="ocioTip" style="display:none;position:fixed;background:rgba(30,40,30,0.95);color:#fff;padding:8px 12px;border-radius:8px;font-size:11px;pointer-events:none;z-index:9999;max-width:340px;line-height:1.7"></div>';

  // ── SECTION TITLE ────────────────────────────────────────────────────
  html += '<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:10px">Equipamentos principais disponíveis (metros lineares e un)</div>';

  // ── UNIFIED BAR LIST ─────────────────────────────────────────────────
  var maxM = perfisList.length ? Math.max.apply(null, perfisList.map(function(p){return p.totalM;})) : 1;
  var maxQ = quadros.length   ? Math.max.apply(null, quadros.map(function(q){return q.qtde;}))       : 1;
  var qScale = maxM / maxQ;

  html += '<div style="display:flex;flex-direction:column;gap:5px">';

  // PERFIS
  perfisList.forEach(function(pf){
    var pct = Math.round(pf.totalM/maxM*100);
    var mLabel = Math.round(pf.totalM).toLocaleString('pt-BR')+'m';
    var shortName = pf.nome.replace(/^PERFIL\s+/i,'');
    var comp = pf.itens.map(function(it){
      return '<span style="color:#aef">'+it.nome.replace(/^PERFIL\s+/i,'')+'</span> ×'+it.qtde+' = '+it.totalM+'m';
    }).join('<br>');
    var tipData = pf.nome+' &nbsp;·&nbsp; '+Math.round(pf.totalM).toLocaleString('pt-BR')+'m<br>'+comp;
    html += '<div style="display:flex;align-items:center;gap:10px;cursor:default" data-tip="'+encodeURIComponent(tipData)+'" class="ocio-row">'
      +'<div style="width:80px;font-size:.74rem;font-weight:600;color:var(--tx);text-align:right;white-space:nowrap">'+shortName+'</div>'
      +'<div style="flex:1;height:16px;background:var(--bd);border-radius:3px;overflow:hidden">'
      +'<div style="height:16px;width:'+pct+'%;background:var(--leve-green);border-radius:3px"></div>'
      +'</div>'
      +'<div style="width:68px;font-size:.78rem;font-weight:600;color:var(--leve-dark);text-align:right">'+mLabel+'</div>'
      +'</div>';
  });

  // SEPARATOR
  if(quadros.length && perfisList.length)
    html += '<div style="height:1px;background:var(--bd2);margin:8px 0"></div>';

  // QUADROS
  quadros.forEach(function(q){
    var pct = Math.max(1, Math.round(q.qtde*qScale/maxM*100));
    var shortName = q.nome.replace(/^QUADRO\s+/i,'');
    var tipData = q.nome+' &nbsp;·&nbsp; '+q.qtde+' un';
    html += '<div style="display:flex;align-items:center;gap:10px;cursor:default" data-tip="'+encodeURIComponent(tipData)+'" class="ocio-row">'
      +'<div style="width:80px;font-size:.72rem;font-weight:600;color:var(--tx);text-align:right;white-space:nowrap">'+shortName+'</div>'
      +'<div style="flex:1;height:16px;background:var(--bd);border-radius:3px;overflow:hidden">'
      +'<div style="height:16px;width:'+pct+'%;background:#6A9228;border-radius:3px"></div>'
      +'</div>'
      +'<div style="width:68px;font-size:.78rem;font-weight:600;color:var(--leve-dark);text-align:right">'+q.qtde+' un</div>'
      +'</div>';
  });

  if(!quadros.length && !perfisList.length){
    html += '<div style="padding:16px 0;color:var(--mu);font-size:.82rem">Nenhum item ocioso para locação imediata após simular todas as movimentações.</div>';
  }

  html += '</div>';
  wrap.innerHTML = html;

  // Tooltip events
  var tip = document.getElementById('ocioTip');
  wrap.querySelectorAll('.ocio-row').forEach(function(row){
    row.addEventListener('mouseenter',function(e){
      if(!tip)return;
      tip.innerHTML=decodeURIComponent(this.getAttribute('data-tip'));
      tip.style.display='block';
      tip.style.left=(e.clientX+16)+'px';
      tip.style.top=(e.clientY-10)+'px';
    });
    row.addEventListener('mousemove',function(e){
      if(!tip)return;
      tip.style.left=(e.clientX+16)+'px';
      tip.style.top=(e.clientY-10)+'px';
    });
    row.addEventListener('mouseleave',function(){if(tip)tip.style.display='none';});
  });
}

// ── RENDER: EVOLUÇÃO DE CONTRATOS ────────────────────────────────────────
function renderContratos(){
  if(!MAPA.loaded) return;

  var cts = MAPA.contratos.filter(function(c){return c.peso_total>=1000;})
    .sort(function(a,b){return b.peso_total-a.peso_total;});

  // Cross with planning
  var movMap = {};
  if(D.movimentacoes && D.movimentacoes.length){
    D.movimentacoes.forEach(function(m){
      var raw = String(m.contrato||'').trim();
      var ct  = raw.indexOf('/')>-1 ? raw.split('/')[0].trim() : raw.replace(/\D/g,'');
      if(!ct||ct==='XXX') return;
      if(!movMap[ct]) movMap[ct]=0;
      var kg = parseFloat(m.peso_kg)||0;
      if(m.tipo==='Saída') movMap[ct] += kg;
      else movMap[ct] -= kg;
    });
  }

  var labels    = cts.map(function(c){ return 'CT '+c.contrato; });
  var tooltips  = cts.map(function(c){ return c.obra; });
  var current   = cts.map(function(c){ return Math.round(c.peso_total)/1000; });
  var deltas    = cts.map(function(c){ return Math.round(movMap[String(c.contrato)]||0)/1000; });
  var projected = cts.map(function(c,i){ return Math.max(0,Math.round((current[i]+(deltas[i]||0))*100)/100); });
  var projColors = projected.map(function(p,i){
    if(!deltas[i]) return 'rgba(138,183,58,0.55)';
    return deltas[i]>0?'rgba(39,174,96,0.85)':'rgba(231,76,60,0.85)';
  });

  // ── TABLE ────────────────────────────────────────
  var tbody=document.getElementById('tblContratosBody');
  if(tbody){
    tbody.innerHTML=cts.slice().reverse().map(function(c,i){
      var idx2=cts.length-1-i;
      var d=deltas[idx2], proj=projected[idx2];
      var arrow=d>0?'<span style="color:#27ae60;font-weight:700">&#9650; +'+d.toFixed(2)+'t</span>'
               :d<0?'<span style="color:#e74c3c;font-weight:700">&#9660; '+d.toFixed(2)+'t</span>'
               :'<span style="color:#aaa">&#8212;</span>';
      return '<tr style="border-bottom:1px solid var(--bd)">'
        +'<td style="padding:6px 8px;font-weight:600">'+c.contrato+'</td>'
        +'<td style="padding:6px 8px">'+c.obra+'</td>'
        +'<td style="padding:6px 8px;text-align:right">'+current[idx2].toFixed(2)+'</td>'
        +'<td style="padding:6px 8px;text-align:right">'+arrow+'</td>'
        +'<td style="padding:6px 8px;text-align:right">'+proj.toFixed(2)+'</td>'
        +'<td style="padding:6px 8px;text-align:center">'+(d>0?'<span style="color:#27ae60">&#9650;</span>':d<0?'<span style="color:#e74c3c">&#9660;</span>':'<span style="color:#ccc">&#9679;</span>')+'</td>'
        +'</tr>';
    }).join('');
  }

  // ── CHART ────────────────────────────────────────
  var wrap = document.getElementById('chartContratosWrap');
  if(!wrap) return;
  var h = Math.max(420, 80 + cts.length*38);
  wrap.style.height = h+'px';

  // Use pure canvas renderer — works everywhere, no CDN dependency
  var oldC = document.getElementById('cContratos');
  if(oldC) oldC.remove();
  var canvas = document.createElement('canvas');
  canvas.id = 'cContratos';
  wrap.appendChild(canvas);

  // Tooltip div for obra names
  var tip = document.getElementById('ctTip');
  if(!tip){
    tip = document.createElement('div');
    tip.id = 'ctTip';
    tip.style.cssText = 'position:fixed;background:rgba(30,40,30,0.92);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;pointer-events:none;display:none;z-index:9999;max-width:260px;line-height:1.4';
    document.body.appendChild(tip);
  }

  // Get container width AFTER append (DOM layout)
  var W = wrap.clientWidth || 800;
  var H = h;
  canvas.width  = W;
  canvas.height = H;

  var ctx2d = canvas.getContext('2d');
  var padL=55, padR=24, padT=36, padB=70;
  var cW=W-padL-padR, cH=H-padT-padB;
  var maxV=0;
  current.concat(projected).forEach(function(v){if(v>maxV)maxV=v;});
  if(!maxV)maxV=1;

  // Grid
  ctx2d.fillStyle='#f8f9f7';
  ctx2d.fillRect(padL,padT,cW,cH);
  ctx2d.strokeStyle='rgba(0,0,0,0.07)'; ctx2d.lineWidth=1;
  for(var gi=0;gi<=5;gi++){
    var gy=padT+cH-(gi/5)*cH;
    ctx2d.beginPath(); ctx2d.moveTo(padL,gy); ctx2d.lineTo(padL+cW,gy); ctx2d.stroke();
    ctx2d.fillStyle='#777'; ctx2d.font='10px Inter,sans-serif'; ctx2d.textAlign='right';
    ctx2d.fillText((maxV*gi/5).toFixed(1)+'t', padL-5, gy+4);
  }

  // Bars
  var nG=labels.length, nS=2;
  var groupW=cW/nG;
  var barW=Math.max(6, Math.min(28, groupW*0.38));
  var groupGap=(groupW-barW*nS)/3;

  labels.forEach(function(lbl,gi){
    var gx=padL+gi*groupW;
    var vals=[current[gi],projected[gi]];
    var colors=['rgba(61,80,68,0.85)', projColors[gi]];

    vals.forEach(function(v,si){
      var bh=(v/maxV)*cH;
      var bx=gx+groupGap*(si+1)+barW*si;
      var by=padT+cH-bh;
      ctx2d.fillStyle=colors[si];
      ctx2d.beginPath();
      if(ctx2d.roundRect){
        ctx2d.roundRect(bx,by,barW,bh,[3,3,0,0]);
      } else {
        ctx2d.rect(bx,by,barW,bh);
      }
      ctx2d.fill();
      // Value on bar
      if(bh>18){
        ctx2d.fillStyle='rgba(255,255,255,0.95)';
        ctx2d.font='bold 8px Inter,sans-serif';
        ctx2d.textAlign='center';
        ctx2d.fillText(v.toFixed(1), bx+barW/2, by+12);
      }
    });

    // X label — contract number
    ctx2d.fillStyle='#333'; ctx2d.font='bold 10px Inter,sans-serif'; ctx2d.textAlign='center';
    ctx2d.fillText(lbl, gx+groupW/2, padT+cH+14);
    // Obra name (truncated)
    var obra=tooltips[gi]; if(obra.length>14) obra=obra.slice(0,13)+'…';
    ctx2d.fillStyle='#888'; ctx2d.font='8px Inter,sans-serif';
    ctx2d.fillText(obra, gx+groupW/2, padT+cH+26);
    // Delta arrow above group
    if(deltas[gi]!==0){
      var arrow=deltas[gi]>0?'▲ +'+deltas[gi].toFixed(1):'▼ '+deltas[gi].toFixed(1);
      ctx2d.fillStyle=deltas[gi]>0?'#27ae60':'#e74c3c';
      ctx2d.font='bold 9px Inter,sans-serif'; ctx2d.textAlign='center';
      var topY=padT+cH-Math.max(current[gi],projected[gi])/maxV*cH-8;
      ctx2d.fillText(arrow+'t', gx+groupW/2, topY);
    }
  });

  // Legend
  var legY=H-16;
  var legData=[
    {label:'Saldo atual',color:'rgba(61,80,68,0.85)'},
    {label:'Projeção (verde=aumento, vermelho=redução)',color:'rgba(39,174,96,0.85)'}
  ];
  legData.forEach(function(l,i){
    var lx=padL+i*220;
    ctx2d.fillStyle=l.color; ctx2d.fillRect(lx,legY-8,12,10);
    ctx2d.fillStyle='#444'; ctx2d.font='10px Inter,sans-serif'; ctx2d.textAlign='left';
    ctx2d.fillText(l.label, lx+16, legY+1);
  });

  // Mousemove tooltip showing full obra name
  canvas.onmousemove = function(e){
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (W / rect.width);
    var gi = Math.floor((mx - padL) / groupW);
    if(gi>=0 && gi<labels.length && tooltips[gi]){
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-10)+'px';
      tip.innerHTML='<strong>'+labels[gi]+'</strong><br>'+tooltips[gi]
        +'<br><span style="opacity:.8">Atual: '+current[gi].toFixed(2)+'t'+(deltas[gi]?' &nbsp;|&nbsp; Delta: '+(deltas[gi]>0?'+':'')+deltas[gi].toFixed(2)+'t':'')+'</span>';
    } else { tip.style.display='none'; }
  };
  canvas.onmouseleave = function(){ tip.style.display='none'; };
}

function renderSublocacao(){

  var nContrSub    = all.filter(function(c){return c.peso_sub>0;}).length;

  var kpis=[

          }}
        },
        scales:{
          x:{ticks:{color:'#333',font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}},
          y:{ticks:{callback:function(v){return 'R$'+Math.round(v/1000)+'k';}},
             title:{display:true,text:'Valor indenização (R$)',font:{size:11}}}

      }

      type:'bar',
      data:{
        labels:ctsPct.map(function(c){return 'CT '+c.contrato+' — '+c.obra.slice(0,25);}),
        datasets:[
          {
            label:'Sublocado',
            data:ctsPct.map(function(c){return Math.round(c.peso_sub)/1000;}),
            backgroundColor:ctsPct.map(function(c){
              return c.pct_sub>=50?'rgba(231,76,60,0.85)':c.pct_sub>=20?'rgba(230,126,34,0.8)':'rgba(243,156,18,0.75)';
            }),
            borderRadius:0
          },
          {
            label:'Próprio',
            data:ctsPct.map(function(c){return Math.round(c.peso_total-c.peso_sub)/1000;}),

          }

        indexAxis:'y',

        plugins:{
          legend:{display:true,position:'top',labels:{font:{size:11},padding:14}},

// ── RENDER: COBERTURA DE PLANEJAMENTO (ASTEC) ─────────────────────────────
function renderCoberturaPlano(){
  var canvas  = document.getElementById('gaugeCobPlan');
  var labelEl = document.getElementById('cobPlanLabel');
  var tblEl   = document.getElementById('cobPlanTabela');
  if(!canvas) return;

  // Contratos >=1t from MAPA
  var cts1t = (MAPA.loaded ? MAPA.contratos : [])
    .filter(function(c){ return c.peso_total >= 1000; });

  // Contratos with at least 1 Retorno in movimentacoes
  var comRetorno = {};
  (D.movimentacoes||[]).forEach(function(m){
    if(m.tipo !== 'Retorno') return;
    var raw = String(m.contrato||'').trim();
    var ct  = raw.indexOf('/')>-1 ? raw.split('/')[0].trim() : raw.replace(/\D/g,'');
    if(ct && ct !== 'XXX') comRetorno[ct] = m;
  });

  var total   = cts1t.length;
  var comPlan = cts1t.filter(function(c){
    return !!comRetorno[String(c.contrato)];
  }).length;
  var semPlan = total - comPlan;
  var pct     = total > 0 ? Math.round(comPlan/total*100) : 0;

  // ── GAUGE ────────────────────────────────────────────────────────────
  var W = canvas.width, H = canvas.height;
  var cx = W/2, cy = H - 14;
  var Ro = W * 0.38, Ri = Ro * 0.44;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  function toA(p){ return Math.PI + (p/100)*Math.PI; }
  function wedge(p1,p2,fill){
    if(p2<=p1) return;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,Ro,toA(p1),toA(p2));
    ctx.arc(cx,cy,Ri,toA(p2),toA(p1),true);
    ctx.closePath();
    ctx.fillStyle=fill; ctx.fill();
  }

  // Zones: 0-50 red, 50-80 yellow, 80-100 green
  var zones=[
    {end:50,  color:'#9b1c1c', bg:'rgba(155,28,28,0.35)'},
    {end:80,  color:'#c98a00', bg:'rgba(201,138,0,0.35)'},
    {end:100, color:'#2d7a3a', bg:'rgba(45,122,58,0.35)'},
  ];
  // Background
  var prev=0;
  zones.forEach(function(z){ wedge(prev,z.end,z.bg); prev=z.end; });
  // Fill up to pct
  prev=0;
  zones.forEach(function(z){
    var se=Math.min(pct,z.end);
    if(prev<se) wedge(prev,se,z.color);
    prev=z.end; if(prev>=pct) return;
  });
  // Separators
  ctx.strokeStyle='rgba(10,20,10,0.5)'; ctx.lineWidth=2;
  zones.slice(0,-1).forEach(function(z){
    var a=toA(z.end);
    ctx.beginPath();
    ctx.moveTo(cx+Ri*Math.cos(a),cy+Ri*Math.sin(a));
    ctx.lineTo(cx+Ro*Math.cos(a),cy+Ro*Math.sin(a));
    ctx.stroke();
  });
  // Border
  ctx.beginPath(); ctx.arc(cx,cy,Ro,Math.PI,0); ctx.arc(cx,cy,Ri,0,Math.PI,true);
  ctx.closePath(); ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1; ctx.stroke();
  // Needle
  var nA=toA(pct);
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=4;
  ctx.beginPath();
  ctx.moveTo(cx-3*Math.cos(nA+Math.PI/2),cy-3*Math.sin(nA+Math.PI/2));
  ctx.lineTo(cx+(Ri*0.85)*Math.cos(nA),cy+(Ri*0.85)*Math.sin(nA));
  ctx.lineTo(cx+3*Math.cos(nA+Math.PI/2),cy+3*Math.sin(nA+Math.PI/2));
  ctx.closePath(); ctx.fillStyle='#000'; ctx.fill();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(cx,cy,Ri*0.28,0,Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
  // Boundary labels
  function outsideLabel(p, txt){
    var a=toA(p), lr=Ro+20, tx=cx+lr*Math.cos(a), ty=cy+lr*Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(cx+(Ro+1)*Math.cos(a),cy+(Ro+1)*Math.sin(a));
    ctx.lineTo(cx+(Ro+9)*Math.cos(a),cy+(Ro+9)*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2; ctx.stroke();
    ctx.font='bold 8px Inter,sans-serif';
    var tw=ctx.measureText(txt).width+6;
    var bx=tx-tw/2, by=ty-6;
    ctx.beginPath(); ctx.rect(bx,by,tw,13);
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(txt,tx,ty);
  }
  outsideLabel(0,'0%'); outsideLabel(50,'50%'); outsideLabel(80,'80%'); outsideLabel(100,'100%');

  // Center value
  ctx.font='bold 18px Inter,sans-serif';
  ctx.fillStyle='var(--leve-dark,#3D5044)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(pct+'%', cx, cy-Ri*0.5);

  // Label below canvas
  if(labelEl){
    var color = pct>=80?'#2d7a3a':pct>=50?'#c98a00':'#9b1c1c';
    labelEl.innerHTML = '<span style="font-size:1.1rem;font-weight:700;color:'+color+'">'+comPlan+'</span>'
      +'<span style="color:var(--mu)"> de </span>'
      +'<span style="font-size:1.1rem;font-weight:700">'+total+'</span>'
      +'<span style="color:var(--mu)"> contratos com devolução mapeada</span>';
  }

  // ── TABLE ────────────────────────────────────────────────────────────
  if(!tblEl) return;
  var rows = cts1t.slice().sort(function(a,b){
    // Com planejamento first, then sem, alphabetical within each group
    var ha = !!comRetorno[String(a.contrato)];
    var hb = !!comRetorno[String(b.contrato)];
    if(ha!==hb) return hb?1:-1;
    return a.obra.localeCompare(b.obra);
  });

  var html = '<table style="width:100%;border-collapse:collapse;font-size:.76rem">';
  html += '<thead><tr style="border-bottom:2px solid var(--bd2);color:var(--mu);font-size:.63rem;text-transform:uppercase;letter-spacing:.5px">'
    +'<th style="text-align:left;padding:5px 8px">Contrato</th>'
    +'<th style="text-align:left;padding:5px 8px">Obra</th>'
    +'<th style="text-align:right;padding:5px 8px">Saldo (t)</th>'
    +'<th style="text-align:center;padding:5px 8px">Devolução</th>'
    +'<th style="text-align:left;padding:5px 8px">Data prevista</th>'
    +'</tr></thead><tbody>';

  rows.forEach(function(c){
    var mov = comRetorno[String(c.contrato)];
    var hasPlan = !!mov;
    var statusBadge = hasPlan
      ? '<span style="background:rgba(45,122,58,0.15);color:#2d7a3a;border-radius:4px;padding:2px 7px;font-weight:600">✓ Mapeada</span>'
      : '<span style="background:rgba(155,28,28,0.12);color:#9b1c1c;border-radius:4px;padding:2px 7px;font-weight:600">✗ Sem previsão</span>';
    var data = mov ? mov.data_fmt : '—';
    html += '<tr style="border-bottom:1px solid var(--bd)">'
      +'<td style="padding:5px 8px;font-weight:600">'+c.contrato+'</td>'
      +'<td style="padding:5px 8px">'+c.obra+'</td>'
      +'<td style="padding:5px 8px;text-align:right">'+(Math.round(c.peso_total)/1000).toFixed(1)+'</td>'
      +'<td style="padding:5px 8px;text-align:center">'+statusBadge+'</td>'
      +'<td style="padding:5px 8px;color:var(--mu)">'+data+'</td>'
      +'</tr>';
  });
  html += '</tbody></table>';
  tblEl.innerHTML = html;
}

function renderMapaASTEC(){
  var svg = document.getElementById('svgMapa');
  if(!svg) return;

  // Coordinate system: north=top, south=bottom
  // ES bounds: lat -17.7(N) to -21.4(S), lng -41.9(W) to -39.5(E)
  var LAT_MAX=-17.7, LAT_MIN=-21.4, LNG_MIN=-41.9, LNG_MAX=-39.5;
  var PAD=30, SW=400, SH=520;

  function sv(lat,lng){
    var x = PAD + (lng-LNG_MIN)/(LNG_MAX-LNG_MIN)*(SW-PAD*2);
    var y = PAD + (LAT_MAX-lat)/(LAT_MAX-LAT_MIN)*(SH-PAD*2);
    return {x:Math.round(x), y:Math.round(y)};
  }

  // ES state outline from real coordinates
  var esPath = 'M 143 55 L 186 52 L 228 49 L 271 52 L 328 67 L 339 105 L 330 142 L 320 192 L 289 241 L 285 281 L 278 304 L 271 328 L 259 351 L 257 366 L 240 391 L 225 415 L 193 440 L 165 463 L 136 471 L 101 484 L 80 465 L 65 440 L 80 415 L 101 391 L 129 366 L 143 341 L 150 316 L 157 291 L 165 266 L 179 241 L 186 216 L 193 192 L 172 167 L 157 142 L 143 117 L 136 92 L 136 67 Z';

  var html = '<defs><filter id="sd"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter></defs>';

  // Ocean background
  html += '<rect x="0" y="0" width="400" height="520" fill="#d6eaf8" opacity="0.4"/>';
  // State fill
  html += '<path d="'+esPath+'" fill="#d4e8c2" stroke="#6a9a3a" stroke-width="2" stroke-linejoin="round"/>';

  // Reference city dots + labels
  var cities=[
    {n:'São Mateus',lat:-18.72,lng:-39.86},
    {n:'Vitória',lat:-20.30,lng:-40.34},
    {n:'Vila Velha',lat:-20.36,lng:-40.29},
    {n:'Serra',lat:-20.13,lng:-40.31},
    {n:'Guarapari',lat:-20.67,lng:-40.51},
    {n:'Cachoeiro',lat:-20.85,lng:-41.11},
    {n:'Colatina',lat:-19.50,lng:-40.63},
  ];
  cities.forEach(function(c){
    var p=sv(c.lat,c.lng);
    html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="2" fill="#555" opacity="0.5"/>';
    html+='<text x="'+(p.x+5)+'" y="'+(p.y+4)+'" font-size="8" fill="#444" font-family="Inter,sans-serif" opacity="0.8">'+c.n+'</text>';
  });

  if(MAPA.loaded){
    // Group by location
    var pins={};
    MAPA.contratos.forEach(function(c){
      if(!c.lat||!c.lng)return;
      var k=c.lat.toFixed(2)+','+c.lng.toFixed(2);
      if(!pins[k])pins[k]={lat:c.lat,lng:c.lng,list:[]};
      pins[k].list.push(c);
    });

    // Store pin data globally for click handler
    window._mapaPin={};
    Object.keys(pins).forEach(function(k){
      var pin=pins[k];
      var p=sv(pin.lat,pin.lng);
      var n=pin.list.length;
      var r=Math.max(14,Math.min(26,10+n*3));
      var hasSub=pin.list.some(function(c){return c.peso_sub>0;});
      var fill=hasSub?'#e67e22':'#3D5044';
      var safeKey='k'+k.replace(/[^a-z0-9]/gi,'_');
      window._mapaPin[safeKey]=pin.list;
      // All circles carry data-pin so any click registers
      html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(r+5)+'" fill="'+fill+'" opacity="0.18" data-pin="'+safeKey+'" style="cursor:pointer" pointer-events="all"/>';
      html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+r+'" fill="'+fill+'" filter="url(#sd)" data-pin="'+safeKey+'" style="cursor:pointer" pointer-events="all"/>';
      html+='<text x="'+p.x+'" y="'+(p.y+4)+'" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold" font-family="Inter,sans-serif" pointer-events="none">'+n+'</text>';
    });

    var noCoord=MAPA.contratos.filter(function(c){return !c.lat;}).length;
    if(noCoord>0)html+='<text x="200" y="512" font-size="9" fill="#888" text-anchor="middle" font-family="Inter,sans-serif">'+noCoord+' obra(s) sem coordenada mapeada</text>';
  } else {
    html+='<text x="200" y="270" font-size="12" fill="#777" text-anchor="middle" font-family="Inter,sans-serif">Carregue mapa.csv para ver as obras</text>';
  }

  svg.innerHTML = html;

  // Click delegation on parent div — most reliable approach for SVG+innerHTML
  window._clickPin = function(key){
    var data = window._mapaPin && window._mapaPin[key];
    if(data) showObraDetalhe(data);
  };
  var mapaDiv = document.getElementById('mapaES');
  if(mapaDiv){
    // Remove old listener to avoid duplicates
    mapaDiv.onclick = function(e){
      var el = e.target;
      // Walk up to find data-pin
      while(el && el !== mapaDiv){
        var pin = el.getAttribute && el.getAttribute('data-pin');
        if(pin){ window._clickPin(pin); return; }
        el = el.parentElement;
      }
    };
  }

  var leg=document.getElementById('mapaLegend');
  if(leg){
    if(MAPA.loaded){
      var tot=MAPA.contratos.length;
      var mapped=MAPA.contratos.filter(function(c){return c.lat;}).length;
      leg.innerHTML='<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3D5044;margin-right:4px;vertical-align:middle"></span>Sem sublocado&nbsp;&nbsp;'
        +'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#e67e22;margin-right:4px;vertical-align:middle"></span>Com sublocado&nbsp;&nbsp;'
        +'<span style="color:var(--mu)">'+mapped+'/'+tot+' contratos mapeados · número = qtd. no local</span>';
    } else {
      leg.innerHTML='<span style="color:var(--mu)">Carregue o arquivo mapa.csv para visualizar as obras no mapa.</span>';
    }
  }
}

function addVisitaRow(data){

    +'<td style="padding:4px 6px"><input type="date" value="'+row.data+'" onchange="visitasData['+idx+'].data=this.value" style="width:110px;font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f)"></td>'
    +'<td style="padding:4px 6px"><select onchange="var p=this.value.split(\'|\');visitasData['+idx+'].contrato=p[0];visitasData['+idx+'].obra=p[1]||\'\';" style="font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f);min-width:80px"><option value="">--</option>'+obras+'</select></td>'
    +'<td style="padding:4px 6px"><input value="'+row.obra+'" onchange="visitasData['+idx+'].obra=this.value" style="width:130px;font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f)" placeholder="Obra"></td>'
    +'<td style="padding:4px 6px"><input value="'+row.tecnico+'" onchange="visitasData['+idx+'].tecnico=this.value" style="width:100px;font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f)" placeholder="Técnico"></td>'
    +'<td style="padding:4px 6px"><select onchange="visitasData['+idx+'].tipo=this.value" style="font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f)">'
    +'<option'+(row.tipo==='Inspeção'?' selected':'')+'">Inspeção</option>'
    +'<option'+(row.tipo==='Manutenção'?' selected':'')+'">Manutenção</option>'
    +'<option'+(row.tipo==='Montagem'?' selected':'')+'">Montagem</option>'
    +'<option'+(row.tipo==='Desmontagem'?' selected':'')+'">Desmontagem</option>'
    +'<option'+(row.tipo==='Entrega'?' selected':'')+'">Entrega</option>'
    +'</select></td>'
    +'<td style="padding:4px 6px"><select onchange="visitasData['+idx+'].status=this.value;this.parentElement.parentElement.style.background=this.value===\'Realizada\'?\'rgba(138,183,58,.08)\':this.value===\'Cancelada\'?\'rgba(231,76,60,.06)\':\'\';" style="font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f)">'
    +'<option'+(row.status==='Agendada'?' selected':'')+'">Agendada</option>'
    +'<option'+(row.status==='Realizada'?' selected':'')+'">Realizada</option>'
    +'<option'+(row.status==='Cancelada'?' selected':'')+'">Cancelada</option>'
    +'</select></td>'
    +'<td style="padding:4px 6px"><input value="'+(row.obs||'')+'" onchange="visitasData['+idx+'].obs=this.value" style="width:160px;font-size:.75rem;padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:var(--card);color:var(--tx);font-family:var(--f)" placeholder="Observações"></td>'
    +'<td style="padding:4px 6px;text-align:center"><button onclick="removeVisita('+idx+')" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:14px">✕</button></td>'
    +'</tr>';
  var tbody = document.getElementById('tblVisitasBody');
  if(tbody) tbody.insertAdjacentHTML('beforeend', tr);
}

function removeVisita(idx){
  visitasData[idx]=null;
  var row = document.getElementById('vrow-'+idx);
  if(row) row.remove();
}

function exportVisitas(){
  var rows = visitasData.filter(Boolean);
  if(!rows.length){alert('Nenhuma visita para exportar.');return;}
  var csv = 'Data;Contrato;Obra;Técnico;Tipo;Status;Observações\n'
    + rows.map(function(r){return [r.data,r.contrato,r.obra,r.tecnico,r.tipo,r.status,r.obs].join(';');}).join('\n');
  var blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'visitas_tecnicas_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function carregarDados(){
  fetch('dados.json')
    .then(function(r){
      if(!r.ok) throw new Error('dados.json não encontrado ('+r.status+')');
      return r.json();
    })
    .then(function(dados){
      // Popula D com todos os dados processados pelo Python
      Object.assign(D, dados);

      // Popula MAPA com os contratos do mapa.csv
      if(dados.mapa && dados.mapa.length){
        MAPA.contratos = dados.mapa;
        MAPA.loaded    = true;
      }

      // Atualiza status "Ao vivo"
      var liveEl = document.getElementById('liveStatus');
      if(liveEl) liveEl.style.display = 'flex';

      // Renderiza tudo
      try { renderAll(); } catch(e){ console.error('renderAll falhou:', e); }
      try { renderOcioImediata(); } catch(e){ console.error('renderOcioImediata falhou:', e); }
      if(MAPA.loaded){
        try { renderContratos(); } catch(e){ console.error('renderContratos falhou:', e); }
        try { renderSublocacao(); } catch(e){ console.error('renderSublocacao falhou:', e); }
        try { renderMapaASTEC(); } catch(e){ console.error('renderMapaASTEC falhou:', e); }
        try { renderCoberturaPlano(); } catch(e){ console.error('renderCoberturaPlano falhou:', e); }
      }
    })
    .catch(function(err){
      console.error('Erro ao carregar dados.json:', err);
      var main = document.querySelector('.main');
      if(main) main.insertAdjacentHTML('afterbegin',
        '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:16px 20px;margin-bottom:18px;font-size:.85rem">'
        +'<strong>⚠ dados.json não encontrado.</strong><br>'
        +'Execute <code>python gerar_dados.py</code> na pasta do dashboard e atualize a página.'
        +'</div>'
      );
    });
}

carregarDados();
